<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CustomerFlow AI">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#036b2a"/>
      <stop offset="100%" stop-color="#014a1c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <circle cx="392" cy="120" r="36" fill="#20ccce" filter="url(#glow)"/>
  <circle cx="392" cy="120" r="14" fill="#ffffff" fill-opacity="0.35"/>
  <path d="M108 328 C 168 196, 268 148, 372 132" fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M124 360 C 178 308, 248 292, 332 312" fill="none" stroke="#20ccce" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M104 392 H 360" fill="none" stroke="#ffffff" stroke-opacity="0.88" stroke-width="28" stroke-linecap="round"/>
</svg>
