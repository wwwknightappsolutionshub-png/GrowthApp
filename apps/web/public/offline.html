<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#025422" />
    <title>CustomerFlow AI is offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #02140a;
        color: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 460px);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 24px;
        background: rgba(255,255,255,.06);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0,0,0,.35);
      }
      .logo {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: #025422;
        display: grid;
        place-items: center;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 24px;
        line-height: 1.1;
        margin: 0 0 10px;
      }
      p {
        color: rgba(248,250,252,.72);
        line-height: 1.55;
        margin: 0 0 18px;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: #20ccce;
        color: #05221b;
        font-weight: 800;
        padding: 12px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 512 512">
          <path d="M122 332c68-132 166-190 268-198" fill="none" stroke="#fff" stroke-width="58" stroke-linecap="round"/>
          <path d="M132 352c58-54 120-72 190-48" fill="none" stroke="#20ccce" stroke-width="58" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>You are offline</h1>
      <p>CustomerFlow AI is installed and ready, but this page needs a connection. Reconnect to sync leads, bookings, invoices and notifications.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
