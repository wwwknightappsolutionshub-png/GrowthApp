# CustomerFlow AI — production nginx configuration (Contabo VPS + aaPanel).
#
# Drop this into /www/server/nginx/conf/vhost/ (or include from the main
# nginx.conf) and reload. Assumes:
#   * SSL certificates issued via aaPanel / Let's Encrypt
#   * The Next.js web app listens on 127.0.0.1:3000 (under supervisor)
#   * The FastAPI API listens on 127.0.0.1:8000 (under supervisor)
#
# WebSocket upgrades are required for /api/v1/notifications/ws — handled below.

upstream customerflow_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream customerflow_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Map Upgrade header for WebSockets ───────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name customerflow.ai www.customerflow.ai app.customerflow.ai api.customerflow.ai;
    return 301 https://$host$request_uri;
}

# ── Main app (customerflow.ai + app.customerflow.ai) ────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name customerflow.ai www.customerflow.ai app.customerflow.ai;

    # SSL — replace with your real cert paths from aaPanel.
    ssl_certificate     /www/server/panel/vhost/cert/customerflow.ai/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/customerflow.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Adjust this to your CSP needs once frontend is locked down.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss:; font-src 'self' data:;" always;

    client_max_body_size 25M;

    # ── API: /api/v1/* → FastAPI ────────────────────────────────────────
    location /api/ {
        proxy_pass http://customerflow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ── Health check ────────────────────────────────────────────────────
    location = /healthz {
        proxy_pass http://customerflow_api/healthz;
        access_log off;
    }

    # ── Next.js static assets ───────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://customerflow_web;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Everything else → Next.js ───────────────────────────────────────
    # Do NOT forward WebSocket upgrades to Next.js (only /api/* uses WS — see above).
    location / {
        proxy_pass http://customerflow_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ── Brute-force protection on auth endpoints ────────────────────────
    location ^~ /api/v1/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://customerflow_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Rate-limit zones (put in http {} or include from main nginx.conf) ───────
# limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
