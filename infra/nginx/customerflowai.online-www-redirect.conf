# customerflowai.online — canonical host redirect (aaPanel / nginx)
#
# Add this server block OR merge into your existing vhost so www redirects to apex.
# In aaPanel: Website → customerflowai.online → Config → paste before the main server block.

server {
    listen 80;
    listen 443 ssl http2;
    server_name www.customerflowai.online;

    ssl_certificate     /www/server/panel/vhost/cert/customerflowai.online/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/customerflowai.online/privkey.pem;

    return 301 https://customerflowai.online$request_uri;
}

# Optional: Bing Webmaster Tools verification file
# Place your BingSiteAuth.xml at apps/web/public/BingSiteAuth.xml and redeploy.
